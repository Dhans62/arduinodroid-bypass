plugins {
    id 'com.android.application'
}

android {
    namespace 'com.dhan.bypass'
    compileSdk 34

    defaultConfig {
        applicationId "com.dhan.bypass"
        minSdk 26 // Sesuai dengan spesifikasi ArduinoDroid
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // API LSPosed stabil terbaru
    compileOnly 'org.lsposed.xposed:api:1.0'
}
